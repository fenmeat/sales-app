<!DOCTYPE html>
	

	<html lang="en">
	

	<head>
	

	<meta charset="UTF-8">
	

	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
	

	<title>FenMeat Sales App</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	

	<style>
	* { box-sizing: border-box; margin: 0; padding: 0; }

	:root {
	--charcoal: #12141C;
	--steel: #262B38;
	--blue: #003CFF;
	--blue-deep: #0026B3;
	--platinum: #F6F5F1;
	--silver: #C9CDD6;
	--dark: #12141C;
	--mid: #262B38;
	--card: #ffffff;
	--border: #ECEAE4;
	--green: #1D8A5C;
	--orange: #C1780E;
	--red: #B23A3A;
	--text: #171923;
	--muted: #6B7280;
	}

	body {
	font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
	background: var(--platinum);
	color: var(--text);
	min-height: 100vh;
	font-variant-numeric: tabular-nums;
	}

	/* HEADER */
	.header {
	background: linear-gradient(160deg, var(--charcoal) 0%, var(--steel) 100%);
	color: white;
	padding: 10px 16px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	position: sticky;
	top: 0;
	z-index: 100;
	box-shadow: 0 2px 0 0 var(--blue);
	}
	.header-logo { height: 60px; display: block; }
	.header-right { font-size: 12px; color: var(--silver); text-align: right; }

	/* DATE BAR */
	.date-bar {
	background: var(--charcoal);
	padding: 12px 16px 18px;
	display: flex;
	align-items: center;
	gap: 12px;
	}
	.date-bar label { color: var(--silver); font-size: 13px; font-weight: 600; white-space: nowrap; }
	.date-bar input[type=date] {
	flex: 1;
	padding: 9px 12px;
	border: none;
	border-radius: 10px;
	font-size: 15px;
	font-weight: 600;
	background: linear-gradient(180deg, #ffffff 0%, #f3f2ef 100%);
	color: var(--dark);
	box-shadow: inset 0 1px 2px rgba(0,0,0,0.06);
	}

	/* MODE TOGGLE */
	.mode-bar {
	background: var(--platinum);
	display: flex;
	padding: 14px 16px 10px;
	gap: 8px;
	}
	.mode-btn {
	flex: 1;
	padding: 10px 4px;
	border: 1px solid var(--border);
	border-radius: 12px;
	font-size: 13px;
	font-weight: 700;
	cursor: pointer;
	transition: all 0.2s;
	background: var(--card);
	color: var(--muted);
	}
	.mode-btn.active {
	color: white;
	border-color: transparent;
	background: linear-gradient(180deg, #1450FF 0%, var(--blue-deep) 100%);
	box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 4px 10px rgba(0,60,255,0.28);
	}

	/* ROUTE TABS */
	.route-tabs {
	background: white;
	display: flex;
	overflow-x: auto;
	border-bottom: 2px solid var(--border);
	padding: 0 8px;
	gap: 4px;
	}
	.route-tab {
	padding: 14px 20px;
	font-size: 17px;
	font-weight: 700;
	border: none;
	background: none;
	cursor: pointer;
	color: var(--muted);
	white-space: nowrap;
	border-bottom: 3px solid transparent;
	margin-bottom: -2px;
	}
	.route-tab.active {
	color: var(--blue);
	border-bottom-color: var(--blue);
	}
	.late-badge {
	display: inline-block;
	background: var(--orange);
	color: white;
	font-size: 9px;
	padding: 1px 4px;
	border-radius: 3px;
	margin-left: 4px;
	}

	/* CONTENT */
	.content { padding: 12px 16px; max-width: 600px; margin: 0 auto; }

	/* ROUTE SUMMARY CARD */
	.route-summary {
	background: white;
	border-radius: 16px;
	padding: 14px 16px;
	margin-bottom: 12px;
	border-left: 4px solid var(--blue);
	display: flex;
	justify-content: space-between;
	align-items: center;
	position: relative;
	box-shadow: 0 1px 2px rgba(18,20,28,0.04), 0 6px 16px rgba(18,20,28,0.08);
	}
	.route-summary .route-name { font-size: 18px; font-weight: 800; }
	.route-summary .route-day { font-size: 12px; color: var(--muted); margin-top: 2px; }
	.route-summary .totals { text-align: right; font-size: 12px; color: var(--muted); }
	.route-summary .total-val { font-size: 16px; font-weight: 700; color: var(--green); }

	/* PRODUCT LIST */
	.product-list { background: white; border-radius: 16px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(18,20,28,0.04), 0 6px 16px rgba(18,20,28,0.08); }
	.product-header {
	background: linear-gradient(135deg, var(--charcoal) 0%, var(--steel) 100%);
	color: white;
	padding: 10px 14px;
	display: grid;
	font-size: 11px;
	font-weight: 700;
	text-transform: uppercase;
	letter-spacing: 0.5px;
	}
	.product-header.morning-mode { grid-template-columns: 1fr 50px 70px 40px; }
	.product-header.evening-mode { grid-template-columns: 1fr 45px 45px 55px 50px; }

	.product-row {
	display: grid;
	align-items: center;
	padding: 10px 14px;
	border-bottom: 1px solid var(--border);
	gap: 8px;
	}
	.product-row.morning-mode { grid-template-columns: 1fr 50px 70px 40px; }
	.product-row.evening-mode { grid-template-columns: 1fr 45px 45px 55px 50px; }
	.product-row:last-child { border-bottom: none; }
	.product-row:nth-child(even) { background: #fafafa; }

	.product-name { font-size: 13px; font-weight: 600; }
	.product-code { font-size: 10px; color: var(--muted); }

	.qty-input {
	width: 100%;
	padding: 7px 6px;
	border: 2px solid var(--border);
	border-radius: 8px;
	font-size: 15px;
	font-weight: 700;
	text-align: center;
	color: var(--dark);
	background: white;
	}
	.qty-input:focus {
	outline: none;
	border-color: var(--blue);
	box-shadow: 0 0 0 3px rgba(0,60,255,0.12);
	}
	.qty-input.modified {
	border-color: var(--orange);
	background: #FFF9F0;
	}
	.load-check {
	width: 24px;
	height: 24px;
	cursor: pointer;
	accent-color: var(--blue);
	}

	.out-display {
	font-size: 15px;
	font-weight: 700;
	text-align: center;
	color: var(--dark);
	background: var(--platinum);
	border-radius: 7px;
	padding: 5px 2px;
	box-shadow: inset 0 1px 2px rgba(18,20,28,0.05);
	}
	.sold-display {
	font-size: 15px;
	font-weight: 700;
	text-align: center;
	}
	.sold-positive { color: var(--green); }
	.sold-negative { color: var(--red); }
	.sold-zero { color: var(--muted); }
	.zoho-display {
	font-size: 15px;
	font-weight: 700;
	text-align: center;
	}
	.zoho-match { color: var(--muted); }
	.zoho-mismatch { color: var(--red); font-weight: 800; }

	/* ACTION BUTTONS */
	.action-bar {
	display: flex;
	gap: 10px;
	margin-bottom: 12px;
	}
	.btn {
	flex: 1;
	padding: 14px;
	border: none;
	border-radius: 14px;
	font-size: 14px;
	font-weight: 700;
	cursor: pointer;
	transition: all 0.15s;
	color: white;
	}
	.btn:active { transform: scale(0.97); }
	.btn-primary {
	background: linear-gradient(180deg, #1450FF 0%, var(--blue-deep) 100%);
	box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 6px 16px rgba(0,60,255,0.28);
	}
	.btn-secondary {
	background: linear-gradient(180deg, var(--steel) 0%, var(--charcoal) 100%);
	box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 4px 12px rgba(18,20,28,0.22);
	}
	.btn-success {
	background: linear-gradient(180deg, #22A06B 0%, var(--green) 100%);
	box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 6px 16px rgba(29,138,93,0.28);
	}
	.btn-print {
	background: linear-gradient(180deg, var(--steel) 0%, var(--charcoal) 100%);
	box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 4px 12px rgba(18,20,28,0.22);
	}

	/* STATUS BAR */
	.status-bar {
	background: white;
	border-radius: 16px;
	padding: 12px 14px;
	margin-bottom: 12px;
	display: flex;
	gap: 16px;
	font-size: 12px;
	box-shadow: 0 1px 2px rgba(18,20,28,0.04), 0 6px 16px rgba(18,20,28,0.08);
	}
	.status-item { flex: 1; text-align: center; }
	.status-val { font-size: 20px; font-weight: 800; }
	.status-label { color: var(--muted); margin-top: 2px; }

	/* LOADING / MESSAGES */
	.loading {
	text-align: center;
	padding: 40px;
	color: var(--muted);
	font-size: 14px;
	}
	.spinner {
	width: 30px; height: 30px;
	border: 3px solid var(--border);
	border-top-color: var(--blue);
	border-radius: 50%;
	animation: spin 0.8s linear infinite;
	margin: 0 auto 12px;
	}
	@keyframes spin { to { transform: rotate(360deg); } }

	.toast {
	position: fixed;
	bottom: 20px;
	left: 50%;
	transform: translateX(-50%);
	background: var(--dark);
	color: white;
	padding: 12px 24px;
	border-radius: 25px;
	font-size: 14px;
	font-weight: 600;
	z-index: 1000;
	animation: slideUp 0.3s ease;
	max-width: 90vw;
	text-align: center;
	box-shadow: 0 8px 24px rgba(18,20,28,0.3);
	}
	.toast.success { background: linear-gradient(180deg, #22A06B 0%, var(--green) 100%); }
	.toast.error { background: var(--red); }
	@keyframes slideUp { from { bottom: 0; opacity: 0; } to { bottom: 20px; opacity: 1; } }

	/* SUMMARY SCREEN */
	.summary-card {
	background: white;
	border-radius: 16px;
	padding: 16px;
	margin-bottom: 12px;
	box-shadow: 0 1px 2px rgba(18,20,28,0.04), 0 6px 16px rgba(18,20,28,0.08);
	}
	.summary-title { font-size: 16px; font-weight: 800; margin-bottom: 12px; color: var(--dark); }
	.summary-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
	.summary-row:last-child { border-bottom: none; }
	.summary-total { font-weight: 700; color: var(--green); }

	/* PRINT STYLES */
	@media print {
	.no-print { display: none !important; }
	body { background: white; }
	.product-row { break-inside: avoid; }
	}
	</style>
	

	</head>

	<script>
	

	// ═══════════════════════════════════════════════════════════════════
	

	// CONFIGURATION
	

	// ═══════════════════════════════════════════════════════════════════
	

	const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzOvHW0qLnNQUP_kgImFdAXNcU7SMDsA6vYOFfeyyuBrs7j4MOrtWBgvoMv8Wba_A1yYw/exec';
	

	const NEW_SHEET_ID = '1UzTdOY9_Ade5bQ4FsQz5_gMgQNmiWWEwIYDoRUKPpak';
	

	

	

	// ═══════════════════════════════════════════════════════════════════
	

	// PRODUCTS (32 products - full list)
	

	// ═══════════════════════════════════════════════════════════════════
	

	const PRODUCTS = [
	

	{code:'W01', name:'BRAAI WORS', price:184},
	

	{code:'W02', name:'OUMA', price:104},
	

	{code:'W03', name:'CHAKALAKA', price:104},

	{code:'P01', name:'PIZZA TOPPINGS', price:200},
	

	{code:'P02', name:'POLONY SMALL', price:56},
	

	{code:'P03', name:'POLONY MED', price:88},
	

	{code:'P04', name:'POLONY LONG', price:136},
	

	{code:'C01', name:'CHICKEN BURGER', price:108},
	

	{code:'C02', name:'CHICKEN STEAK', price:108},
	

	{code:'C03', name:'CHICKEN NUGGETS', price:108},
	

	{code:'S01', name:'SIX GUN 20g', price:95},
	

	{code:'S02', name:'SIX GUN 200g', price:20},
	

	{code:'S03', name:'CHICKEN SOUPPACK', price:300},
	

	{code:'O01', name:'HEADS & FEET', price:200},
	

	{code:'O02', name:'CHICKEN NECKS', price:220},

	// ═══════════════════════════════════════════════════════════════════
	

	// ROUTE LOGIC
	

	// ═══════════════════════════════════════════════════════════════════
	

	function getRoutesForDate(dateStr) {
	

	const d = new Date(dateStr + 'T12:00:00');
	

	const day = d.getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
	

	// Friday alternation anchored to a known date (19 June 2026 = STILBAAI), counted in whole weeks.
	// This avoids calendar week-of-year drift across year boundaries.
	const altAnchor = new Date('2026-06-19T12:00:00');
	const weeksFromAnchor = Math.round((d - altAnchor) / (7 * 86400000));
	const isEvenWeek = weeksFromAnchor % 2 === 0;
	

	

	

	if (day === 1) return [{name:'GEORGE', day:'Monday', late:false}];
	

	if (day === 2) return [
	

	{name:'KNYSNA', day:'Tuesday', late:false},
	

	{name:'RIVERSDALE', day:'Tuesday', late:false},
	

	{name:'GROOTBRAK', day:'Tuesday', late:true},
	

	];
	

	if (day === 3) return [
	

	{name:'PACALTSDORP', day:'Wednesday', late:false},
	

	{name:'CRAGS', day:'Wednesday', late:false},
	

	];
	

	if (day === 4) return [
	

	{name:'MOSSEL BAY', day:'Thursday', late:false},
	

	{name:'PLETT', day:'Thursday', late:false},
	

	];
	

	if (day === 5) {
	

	const altRoute = isEvenWeek ? 'STILBAAI' : 'OUDTSHOORN';
	

	return [
	

	{name:'THEMBALETHU', day:'Friday', late:false},
	

	{name:altRoute, day:'Friday', late:false},
	

	];
	

	}
	

	return [];
	

	}
	

	

	

	// ═══════════════════════════════════════════════════════════════════
	

	// STATE
	

	// ═══════════════════════════════════════════════════════════════════
	

	let state = {
	

	date: '',
	

	mode: 'morning',
	

	routes: [],
	

	activeRoute: '',
	

	// Per route data: { routeName: { products: [{code, name, price, out, in, forecast}] } }
	

	routeData: {},
	

	forecastLoaded: false,
	

	};
	

	

	

	// ═══════════════════════════════════════════════════════════════════
	

	// INIT
	

	// ═══════════════════════════════════════════════════════════════════
	

	window.onload = function() {
	

	// Set today's date
	

	const today = new Date();
	

	const yyyy = today.getFullYear();
	

	const mm = String(today.getMonth()+1).padStart(2,'0');
	

	const dd = String(today.getDate()).padStart(2,'0');
	

	document.getElementById('dateInput').value = `${yyyy}-${mm}-${dd}`;
	

	onDateChange();
	

	

	

	// Test connection to Apps Script
	

	testConnection();
	

	};
	

	

	

	async function testConnection() {
	

	try {
	

	const url = `${SCRIPT_URL}?action=ping&sheetId=${NEW_SHEET_ID}`;
	

	const resp = await fetch(url);
	

	const data = await resp.json();
	

	if (data.status === 'ok') {
	

	setStatus('🟢 Connected', 'green');
	

	} else {
	

	setStatus('🟡 Script connected', 'orange');
	

	}
	

	} catch(e) {
	

	setStatus('🔴 Offline — using forecast data', 'red');
	

	}
	

	}
	

	

	

	function setStatus(msg, color) {
	

	const el = document.getElementById('connectionStatus');
	

	el.textContent = msg;
	

	el.style.color = color === 'green' ? '#27AE60' : color === 'red' ? '#E74C3C' : '#F39C12';
	

	}
	

	

	

	// ═══════════════════════════════════════════════════════════════════
	

	// DATE CHANGE
	

	// ═══════════════════════════════════════════════════════════════════
	

	function onDateChange() {
	

	const dateStr = document.getElementById('dateInput').value;
	

	if (!dateStr) return;
	

	

	

	state.date = dateStr;
	

	state.routes = getRoutesForDate(dateStr);
	

	state.forecastLoaded = false;
	

	

	

	if (state.routes.length === 0) {
	

	document.getElementById('routeTabs').innerHTML = '';
	

	document.getElementById('mainContent').innerHTML = `
	

	<div class="loading">
	

	<div style="font-size:40px;margin-bottom:12px">😴</div>
	

	<strong>No routes today</strong><br>
	

	<span style="color:var(--muted)">Routes run Monday to Friday only</span>
	

	</div>`;
	

	return;
	

	}
	

	

	

	// Init route data
	

	state.routes.forEach(r => {
	

	if (!state.routeData[r.name]) {
	

	state.routeData[r.name] = {
	

	products: PRODUCTS.map(p => ({...p, out: 0, inQty: 0, forecast: 0, loaded: false}))
	

	};
	

	}
	

	});
	

	

	

	state.activeRoute = state.routes[0].name;
	

	renderRouteTabs();
	

	loadForecastData();
	

	}
	

	

	

	// ═══════════════════════════════════════════════════════════════════
	

	// LOAD FORECAST FROM GOOGLE SHEETS
	

	// ═══════════════════════════════════════════════════════════════════
	

	async function loadForecastData() {
	

	renderContent(); // Show loading state
	

	

	

	for (const route of state.routes) {
	

	try {
	

	const url = `${SCRIPT_URL}?action=getForecast&route=${encodeURIComponent(route.name)}&date=${state.date}&sheetId=${NEW_SHEET_ID}`;
	

	const resp = await fetch(url);
	

	const data = await resp.json();
	

	

	

	if (data.products && data.products.length > 0) {
	

	// Map forecast data to products
	

	state.routeData[route.name].products = PRODUCTS.map(p => {
	

	const f = data.products.find(fp => fp.code === p.code);
	

	return {
	

	...p,
	

	out: f ? f.qty : 0,
	

	forecast: f ? f.qty : 0,
	

	inQty: 0,
	

	loaded: true,
	

	};
	

	});
	

	} else {
	

	// Use FORECAST sheet averages from our new sheet as fallback
	

	await loadFromNewForecastSheet(route.name);
	

	}
	

	} catch(e) {
	

	// Fallback to new sheet direct
	

	await loadFromNewForecastSheet(route.name);
	

	}

	// Apply any saved Morning Load override so confirmed loads persist (restored 23 June 2026)
	await applyLoadLogOverride(route.name);
	
	// Apply any saved Evening Capture IN override so captured sales persist (added 25 June 2026)
	await applySalesLogOverride(route.name);
	
	

	}
	

	

	

	state.forecastLoaded = true;
	

	renderContent();
	

	}
	

	

	

	// ═══════════════════════════════════════════════════════════════════
	// APPLY SAVED MORNING LOAD (restored 23 June 2026 — confirmed loads must persist)
	// ═══════════════════════════════════════════════════════════════════
	async function applyLoadLogOverride(routeName) {
	try {
	const url = `${SCRIPT_URL}?action=getLoadLog&route=${encodeURIComponent(routeName)}&date=${state.date}&sheetId=${NEW_SHEET_ID}`;
	const resp = await fetch(url);
	const data = await resp.json();
	if (data.found && data.products && data.products.length > 0) {
	state.routeData[routeName].products = state.routeData[routeName].products.map(p => {
	const saved = data.products.find(sp => sp.code === p.code);
	return saved ? { ...p, out: saved.qty } : p;
	});
	}
	} catch (e) {
	// No connection - keep forecast values, don't block the app
	}
	}
	

	// ═══════════════════════════════════════════════════════════════════
	// APPLY SAVED EVENING CAPTURE IN (added 25 June 2026 — captured sales must persist)
	// IN is reconstructed as OUT (already overridden above) minus SOLD from SALES_LOG,
	// since raw IN is not stored directly in SALES_LOG.
	// ═══════════════════════════════════════════════════════════════════
	async function applySalesLogOverride(routeName) {
	try {
	const url = `${SCRIPT_URL}?action=getSalesLog&route=${encodeURIComponent(routeName)}&date=${state.date}&sheetId=${NEW_SHEET_ID}`;
	const resp = await fetch(url);
	const data = await resp.json();
	if (data.found && data.products && data.products.length > 0) {
	state.routeData[routeName].products = state.routeData[routeName].products.map(p => {
	const soldRow = data.products.find(sp => sp.code === p.code);
	if (!soldRow) return p;
	const inQty = Math.max(0, p.out - soldRow.sold);
	return { ...p, inQty: inQty };
	});
	}
	} catch (e) {
	// No connection - keep default inQty, don't block the app
	}
	}
	

	async function loadFromNewForecastSheet(routeName) {
	

	try {
	

	// Read from FORECAST sheet in new Master File
	

	const url = `${SCRIPT_URL}?action=getNewForecast&route=${encodeURIComponent(routeName)}&sheetId=${NEW_SHEET_ID}`;
	

	const resp = await fetch(url);
	

	const data = await resp.json();
	

	

	

	if (data.products && data.products.length > 0) {
	

	state.routeData[routeName].products = PRODUCTS.map(p => {
	

	const f = data.products.find(fp => fp.code === p.code);
	

	const qty = f ? Math.round(f.avg_qty) : 0;
	

	return { ...p, out: qty, forecast: qty, inQty: 0, loaded: true };
	

	});
	

	} else {
	

	// Mark as loaded with zeros
	

	state.routeData[routeName].products = PRODUCTS.map(p => ({
	

	...p, out: 0, forecast: 0, inQty: 0, loaded: true
	

	}));
	

	}
	

	} catch(e) {
	

	// No connection - use zeros
	

	state.routeData[routeName].products = PRODUCTS.map(p => ({
	

	...p, out: 0, forecast: 0, inQty: 0, loaded: true
	

	}));
	

	}
	

	}
	

	

	

	// ═══════════════════════════════════════════════════════════════════
	

	// RENDER ROUTE TABS
	

	// ═══════════════════════════════════════════════════════════════════
	

	function renderRouteTabs() {
	

	const tabsEl = document.getElementById('routeTabs');
	

	tabsEl.innerHTML = state.routes.map(r => `
	

	<button class="route-tab ${r.name === state.activeRoute ? 'active' : ''}"
	

	onclick="setActiveRoute('${r.name}')">
	

	${r.name}
	

	${r.late ? '<span class="late-badge">13:00</span>' : ''}
	

	</button>
	

	`).join('');
	

	}
	

	

	

	function setActiveRoute(name) {
	

	state.activeRoute = name;
	

	renderRouteTabs();
	

	renderContent();
	

	}
	

	

	

	// ═══════════════════════════════════════════════════════════════════
	

	// MODE TOGGLE
	

	// ═══════════════════════════════════════════════════════════════════
	

	function setMode(mode) {
	

	state.mode = mode;
	

	document.getElementById('btnMorning').className = `mode-btn morning ${mode === 'morning' ? 'active' : ''}`;
	

	document.getElementById('btnEvening').className = `mode-btn evening ${mode === 'evening' ? 'active' : ''}`;
	document.getElementById('btnCashUp').className = `mode-btn cashup ${mode === 'cashup' ? 'active' : ''}`;
	document.getElementById('btnCommission').className = `mode-btn commission ${mode === 'commission' ? 'active' : ''}`;

	// Commission is a weekly view across all routes, not per-route — hide the route tabs for it
	document.getElementById('routeTabs').style.display = (mode === 'commission') ? 'none' : '';

	renderContent();
	

	}
	

	

	

	// ═══════════════════════════════════════════════════════════════════
	

	// RENDER MAIN CONTENT
	

	// ═══════════════════════════════════════════════════════════════════
	

	function renderContent() {
	

	// Commission is a weekly view across all routes, not tied to state.activeRoute
	if (state.mode === 'commission') {
	renderCommission();
	return;
	}

	const route = state.routes.find(r => r.name === state.activeRoute);
	

	if (!route) return;
	

	

	

	const rData = state.routeData[state.activeRoute];
	

	if (!rData || !rData.products[0].loaded) {
	

	document.getElementById('mainContent').innerHTML = `
	

	<div class="loading">
	

	<div class="spinner"></div>
	

	Loading ${state.activeRoute} data...
	

	</div>`;
	

	return;
	

	}
	

	

	

	const products = rData.products;
	

	const totalOut = products.reduce((s, p) => s + p.out, 0);
	

	const totalIn = products.reduce((s, p) => s + p.inQty, 0);
	

	const totalSold = totalOut - totalIn;
	

	const totalValue = products.reduce((s, p) => s + (p.out - p.inQty) * p.price, 0);
	

	

	

	if (state.mode === 'morning') {
	renderMorning(route, products, totalOut, totalValue);
	} else if (state.mode === 'evening') {
	renderEvening(route, products, totalOut, totalIn, totalSold, totalValue);
	} else {
	renderCashUp(route, totalValue);
	}
	

	}
	

	

	

	function renderMorning(route, products, totalOut, totalValue) {
	

	const html = `
	

	<div class="route-summary">
	

	<div>
	

	<div class="route-name">${route.name}</div>
	

	<div class="route-day">📅 ${route.day} — ${state.date}</div>
	

	</div>
	

	<div class="totals">
	

	<div class="total-val">${totalOut} bags</div>
	

	<div>Load Total</div>
	

	</div>
	

	</div>

	async function loadZohoItemSales(routeName) {
	try {
	const url = `${SCRIPT_URL}?action=getZohoItemSales&route=${encodeURIComponent(routeName)}&date=${state.date}&sheetId=${NEW_SHEET_ID}`;

	const products = state.routeData[routeName].products;
	products.forEach((p, i) => {

	function updateOut(idx, val) {

	const soldEl = document.getElementById('mainContent').querySelectorAll('.sold-display')[idx];

	if (zohoEl && typeof p.zohoQty === 'number') {
	zohoEl.className = `zoho-display ${p.zohoQty === sold ? 'zoho-match' : 'zoho-mismatch'}`;
	}
	}
	

	updateTotals();
	

	}

	// Tick box for Morning Load — visual loading checklist only (not saved to the
	// backend; matches the same idea as the ✓ column on the printed paper list)
	function toggleChecked(idx, checked) {
	state.routeData[state.activeRoute].products[idx].checked = checked;

	function updateIn(idx, val) {
	

	const v = parseInt(val) || 0;
	

	state.routeData[state.activeRoute].products[idx].inQty = v;
	

	// Update sold display
	

	const rows = document.querySelectorAll('.product-row.evening-mode');
	

	if (rows[idx]) {

	const sold = p.out - p.inQty;

	soldEl.className = `sold-display ${sold > 0 ? 'sold-positive' : sold < 0 ? 'sold-negative' : 'sold-zero'}`;
	

	

	const zohoEl = rows[idx].querySelector('.zoho-display');
	if (zohoEl && typeof p.zohoQty === 'number') {
	zohoEl.className = `zoho-display ${p.zohoQty === sold ? 'zoho-match' : 'zoho-mismatch'}`;
	}
	}
	

	}
	

	updateTotals();
	

	}
	

	

	

	function updateTotals() {
	

	const products = state.routeData[state.activeRoute].products;
	

	const totalOut = products.reduce((s, p) => s + p.out, 0);
	

	const totalIn = products.reduce((s, p) => s + p.inQty, 0);
	

	const totalSold = totalOut - totalIn;
	

	const totalValue = products.reduce((s, p) => s + (p.out - p.inQty) * p.price, 0);
	

	

	

	// Update status bars
	

	const vals = document.querySelectorAll('.status-val');
	

	if (vals.length >= 3) {
	

	vals[0].textContent = totalOut;
	

	vals[1].textContent = totalIn;
	

	vals[2].textContent = totalSold;
	

	}
	

	const totalValEl = document.querySelector('.total-val');
	

	if (totalValEl) {
	

	totalValEl.textContent = `R ${totalValue.toLocaleString('en-ZA')}`;
	

	}
	

	}

function updateCashTotal() {
	const denoms = [
		{key:'r200', value:200}, {key:'r100', value:100}, {key:'r50', value:50},
		{key:'r20', value:20}, {key:'r10', value:10}, {key:'r5', value:5},
		{key:'r2', value:2}, {key:'r1', value:1}, {key:'r050', value:0.5}
	];
	let total = 0;
	denoms.forEach(d => {
		const qty = Number(document.getElementById(`denom_${d.key}`).value) || 0;
		const sub = qty * d.value;
		total += sub;
		document.getElementById(`sub_${d.key}`).textContent = `R ${sub.toLocaleString('en-ZA', {minimumFractionDigits:2})}`;
	});
	document.getElementById('cashCountedTotal').textContent = `R ${total.toLocaleString('en-ZA', {minimumFractionDigits:2})}`;

	const zoho = state.cashUpZoho;
	const diffEl = document.getElementById('cashDiffValue');
	if (zoho) {
		const expectedCash = Number(zoho.cashTotal) || 0;
		const shop2shop = Number(zoho.shop2shopTotal) || 0; // informational only, not used in cash diff
		const diff = total - expectedCash; // Counted Cash vs Zoho Cash (fixed 25 June 2026)
		diffEl.textContent = `R ${diff.toLocaleString('en-ZA', {minimumFractionDigits:2})} ${diff >= 0 ? '(Over)' : '(Short)'}`;
		diffEl.style.color = diff === 0 ? 'var(--green)' : (diff > 0 ? 'var(--blue)' : 'var(--red)');
	} else {
		diffEl.textContent = '—';
	}
}

// Recalculates and displays the commission figure whenever Sales Person or
// Credit Not Collected changes. Formula: (Sales Value - Credit Not Collected)
// x 0.7% — commission itself is calculated-only, never hand-edited. Credit Not
// Collected is entered manually (Zoho sync proved unreliable for this figure).
function updateCommissionDisplay() {
	const commissionEl = document.getElementById('commissionVal');
	if (!commissionEl) return;
	const cncEl = document.getElementById('creditNotCollectedInput');
	const creditNotCollected = cncEl ? (Number(cncEl.value) || 0) : 0;
	const salesValue = state.cashUpSalesValue || 0;
	const commission = (salesValue - creditNotCollected) * 0.007;
	commissionEl.textContent = `R ${commission.toLocaleString('en-ZA', {minimumFractionDigits:2})}`;
}

async function saveCashUp(totalValue) {
	const denoms = [
		{key:'r200', value:200}, {key:'r100', value:100}, {key:'r50', value:50},
		{key:'r20', value:20}, {key:'r10', value:10}, {key:'r5', value:5},
		{key:'r2', value:2}, {key:'r1', value:1}, {key:'r050', value:0.5}
	];
	let cashCountedTotal = 0;
	const counts = {};
	denoms.forEach(d => {
		const qty = Number(document.getElementById(`denom_${d.key}`).value) || 0;
		counts[d.key] = qty;
		cashCountedTotal += qty * d.value;
	});

	const zoho = state.cashUpZoho || {};
	const expectedCash = Number(zoho.cashTotal) || 0;
	const shop2shop = Number(zoho.shop2shopTotal) || 0; // informational only, not used in cash diff
	const cashDifference = cashCountedTotal - expectedCash; // Counted Cash vs Zoho Cash (fixed 25 June 2026)

	try {
		const resp = await fetch(SCRIPT_URL, {
			method: 'POST',
			headers: {'Content-Type': 'text/plain'},
			body: JSON.stringify({
				action: 'writeCashUpLog',
				sheetId: NEW_SHEET_ID,
				date: state.date,
				route: state.activeRoute,
				cashUp: {
					stockSalesValue: totalValue,
					zohoTotalSales: Number(zoho.zohoTotalSales) || 0,
					zohoCash: Number(zoho.cashTotal) || 0,
					zohoShop2Shop: shop2shop,
					newCreditToday: Number(zoho.newCreditToday) || 0,
					creditCollectedToday: Number(zoho.creditCollectedToday) || 0,
					...counts,
					cashCountedTotal,
					cashDifference
				}
			})
		});
		const data = await resp.json();
		if (data.status === 'ok') {
			let toastMsg = `✅ Cash Up saved — Difference: R ${cashDifference.toLocaleString('en-ZA', {minimumFractionDigits:2})}`;

			const salesPersonEl = document.getElementById('salesPersonInput');
			const salesPerson = salesPersonEl ? salesPersonEl.value.trim() : '';
			if (salesPerson) {
				const cncEl = document.getElementById('creditNotCollectedInput');
				const creditNotCollected = cncEl ? (Number(cncEl.value) || 0) : 0;
				const commission = (totalValue - creditNotCollected) * 0.007;
				try {
					await fetch(SCRIPT_URL, {
						method: 'POST',
						headers: {'Content-Type': 'text/plain'},
						body: JSON.stringify({
							action: 'writeCommissionLog',
							sheetId: NEW_SHEET_ID,
							date: state.date,
							route: state.activeRoute,
							commission: {
								salesPerson: salesPerson,
								salesValue: totalValue,
								creditNotCollected: creditNotCollected,
								commission: commission
							}
						})
					});
					toastMsg += ` | Commission: R ${commission.toLocaleString('en-ZA', {minimumFractionDigits:2})}`;
				} catch (e) {
					// Commission save failed silently — Cash Up itself already saved successfully
				}
			}

			showToast(toastMsg, 'success');
		} else {
			showToast(`❌ ${data.message}`, 'error');
		}
	} catch (err) {
		showToast(`❌ Save failed: ${err.message}`, 'error');
	}
}

	// CONFIRM MORNING LOAD
	

	// ═══════════════════════════════════════════════════════════════════
	

	async function confirmMorning() {
	const products = state.routeData[state.activeRoute].products;
	const totalOut = products.reduce((s, p) => s + p.out, 0);
	if (totalOut === 0) {
	showToast('⚠️ No quantities entered', 'error');
	return;
	}
	if (!confirm(`Confirm loading ${totalOut} bags for ${state.activeRoute}?\n\nThis cannot be undone.`)) return;
	showToast('💾 Saving load...', '');
	const rows = products.map(p => ({ code: p.code, name: p.name, qty: p.out }));
	try {
	const resp = await fetch(SCRIPT_URL, {
	method: 'POST',
	headers: {'Content-Type': 'text/plain'},
	body: JSON.stringify({
	action: 'writeLoadLog',
	sheetId: NEW_SHEET_ID,
	date: state.date,
	route: state.activeRoute,
	rows: rows
	})
	});
	const data = await resp.json();
	if (data.status === 'ok') {
	showToast(`✅ ${state.activeRoute} load confirmed — ${totalOut} bags`, 'success');
	setMode('evening');
	} else {
	showToast('⚠️ Save failed: ' + (data.message || 'unknown error'), 'error');
	}
	} catch (e) {
	showToast('⚠️ Save failed - check connection', 'error');
	}

	async function saveSalesData() {
	

	const products = state.routeData[state.activeRoute].products;
	

	const totalSold = products.reduce((s, p) => s + (p.out - p.inQty), 0);
	

	const totalValue = products.reduce((s, p) => s + (p.out - p.inQty) * p.price, 0);
	

	

	

	if (totalSold <= 0) {
	

	showToast('⚠️ No sales to save', 'error');
	

	return;
	

	}
	

	

	

	if (!confirm(`Save sales for ${state.activeRoute}?\n\nTotal Sold: ${totalSold} bags\nValue: R ${totalValue.toLocaleString('en-ZA')}`)) return;
	

	

	

	showToast('💾 Saving...', '');
	

	

	

	const _d = new Date(state.date + 'T12:00:00');
	const _dayNum = _d.getDay() === 0 ? 7 : _d.getDay();
	_d.setDate(_d.getDate() - (_dayNum - 1));
	const weekStart = _d.toISOString().split('T')[0];
	

	const salesRows = products
	

	.filter(p => (p.out - p.inQty) > 0)
	

	.map(p => ({
	

	date: state.date,
	weekStart: weekStart,
	

	route: state.activeRoute,
	

	code: p.code,
	

	name: p.name,
	

	out: p.out,
	

	inQty: p.inQty,
	

	sold: p.out - p.inQty,
	

	price: p.price,
	

	value: (p.out - p.inQty) * p.price
	

	}));
	

	

	

	try {
	

	const resp = await fetch(SCRIPT_URL, {
	

	method: 'POST',
	

	headers: {'Content-Type': 'text/plain'},
	

	body: JSON.stringify({
	

	action: 'writeSalesLog',
	

	sheetId: NEW_SHEET_ID,
	

	date: state.date,
	

	route: state.activeRoute,
	

	rows: salesRows
	

	})
	

	});
	

	const data = await resp.json();
	

	if (data.status === 'ok') {
	

	showToast(`✅ Saved! ${salesRows.length} products — R ${totalValue.toLocaleString('en-ZA')}`, 'success');
	

	} else {
	

	throw new Error(data.message || 'Save failed');
	

	}
	

	} catch(e) {
	

	// Save locally as fallback
	

	const saved = JSON.stringify({date: state.date, route: state.activeRoute, rows: salesRows});
	

	console.log('SALES DATA (copy if needed):', saved);
	

	showToast('⚠️ Could not save to Sheet — see console for data', 'error');
	

	}
	

	}

// WEEKLY COMMISSION — added 10 July 2026
// Not tied to a route; summarises COMMISSION_LOG entries by salesperson
// across a Mon-Fri work week, and lets Alex look up past weeks.
// ═══════════════════════════════════════════════════════════════════

// Mirrors the backend's getWeekEndingFriday() so the default week shown
// on screen always matches what the backend will actually group by.
function getWeekEndingFridayJS(dateStr) {
	const d = new Date(dateStr + 'T12:00:00');
	const dow = d.getDay(); // 0=Sun...6=Sat
	let diffToFriday;
	if (dow >= 1 && dow <= 5) {
		diffToFriday = 5 - dow;
	} else {
		diffToFriday = (dow === 6) ? -1 : 5;
	}
	d.setDate(d.getDate() + diffToFriday);
	const yyyy = d.getFullYear();
	const mm = String(d.getMonth()+1).padStart(2,'0');
	const dd = String(d.getDate()).padStart(2,'0');
	return `${yyyy}-${mm}-${dd}`;
}

function renderCommission() {
	const defaultWeekEnding = getWeekEndingFridayJS(state.date || new Date().toISOString().split('T')[0]);

	document.getElementById('mainContent').innerHTML = `
		<div class="summary-card">
			<div class="summary-title">🧾 Weekly Commission</div>
			<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
				<label style="font-size:13px;font-weight:600;">Week Ending (Friday):</label>
				<input type="date" id="commissionWeekInput" value="${defaultWeekEnding}"
					style="padding:8px;border:1px solid var(--border);border-radius:6px;font-size:14px;">
			</div>
			<div class="action-bar" style="margin-bottom:0;">
				<button class="btn btn-primary" onclick="calculateWeekCommissionClick()">🧮 Calculate Week's Commission</button>
			</div>
		</div>

		<div id="commissionResults"></div>

		<div class="summary-card">
			<div class="summary-title">📅 Past Weeks</div>
			<div id="commissionHistory">
				<button class="btn btn-secondary" onclick="loadCommissionHistory()">Show Past Weeks</button>
			</div>
		</div>
	`;
}

// If the picked date is not a Friday, snap it to the Friday of that same Mon-Fri week
function snapToFridayIfNeeded(dateStr) {
	return getWeekEndingFridayJS(dateStr);
}

async function calculateWeekCommissionClick() {
	const raw = document.getElementById('commissionWeekInput').value;
	if (!raw) {
		showToast('⚠️ Pick a week ending date first', 'error');
		return;
	}
	const weekEnding = snapToFridayIfNeeded(raw);
	document.getElementById('commissionWeekInput').value = weekEnding;

	document.getElementById('commissionResults').innerHTML = `<div class="loading"><div class="spinner"></div>Calculating...</div>`;

	try {
		const resp = await fetch(SCRIPT_URL, {
			method: 'POST',
			headers: {'Content-Type': 'text/plain'},
			body: JSON.stringify({
				action: 'calculateWeekCommission',
				sheetId: NEW_SHEET_ID,
				weekEnding: weekEnding
			})
		});
		const data = await resp.json();
		if (data.status === 'ok') {
			renderCommissionResults(weekEnding, data.results);
		} else {
			document.getElementById('commissionResults').innerHTML = `<div class="summary-card" style="color:var(--red);">❌ ${data.message}</div>`;
		}
	} catch (err) {
		document.getElementById('commissionResults').innerHTML = `<div class="summary-card" style="color:var(--red);">❌ Could not calculate: ${err.message}</div>`;
	}
}

function renderCommissionResults(weekEnding, results) {
	const box = document.getElementById('commissionResults');
	if (!results || results.length === 0) {
		box.innerHTML = `<div class="summary-card">No commission entries saved for week ending ${weekEnding} yet — save Cash Up with a Sales Person on each route first.</div>`;
		return;
	}
	const grandTotal = results.reduce((s, r) => s + r.totalCommission, 0);
	box.innerHTML = `
		<div class="summary-card">
			<div class="summary-title">Week Ending ${weekEnding}</div>
			${results.map(r => `
				<div class="summary-row">
					<span>${r.salesperson} <span style="color:var(--muted);font-size:11px;">(${r.routeCount} route${r.routeCount === 1 ? '' : 's'})</span></span>
					<span class="summary-total">R ${r.totalCommission.toLocaleString('en-ZA', {minimumFractionDigits:2})}</span>
				</div>
			`).join('')}
			<div class="summary-row" style="border-top:2px solid var(--dark);margin-top:6px;padding-top:10px;font-weight:800;">
				<span>Total</span>
				<span class="summary-total">R ${grandTotal.toLocaleString('en-ZA', {minimumFractionDigits:2})}</span>
			</div>
		</div>
	`;
}

async function loadCommissionHistory() {
	const box = document.getElementById('commissionHistory');
	box.innerHTML = `<div class="loading"><div class="spinner"></div>Loading...</div>`;
	try {
		const resp = await fetch(`${SCRIPT_URL}?action=getWeeklyCommission&sheetId=${NEW_SHEET_ID}`);
		const data = await resp.json();
		const weeks = data.weeks || [];
		if (weeks.length === 0) {
			box.innerHTML = `<div style="color:var(--muted);">No past weeks calculated yet.</div>`;
			return;
		}
		box.innerHTML = weeks.map(w => `
			<div class="summary-row" style="cursor:pointer;" onclick="viewCommissionWeek('${w.weekEnding}')">
				<span>Week Ending ${w.weekEnding}</span>
				<span class="summary-total">R ${w.totalCommission.toLocaleString('en-ZA', {minimumFractionDigits:2})}</span>
			</div>
		`).join('');
	} catch (err) {
		box.innerHTML = `<div style="color:var(--red);">Could not load history: ${err.message}</div>`;
	}
}

async function viewCommissionWeek(weekEnding) {
	document.getElementById('commissionWeekInput').value = weekEnding;
	document.getElementById('commissionResults').innerHTML = `<div class="loading"><div class="spinner"></div>Loading week ${weekEnding}...</div>`;
	try {
		const resp = await fetch(`${SCRIPT_URL}?action=getWeeklyCommission&weekEnding=${weekEnding}&sheetId=${NEW_SHEET_ID}`);
		const data = await resp.json();
		if (data.status === 'ok') {

	} catch (err) {
		document.getElementById('commissionResults').innerHTML = `<div class="summary-card" style="color:var(--red);">❌ Could not load week: ${err.message}</div>`;
	}
	window.scrollTo({top: 0, behavior: 'smooth'});
}

	.meta { color: #666; margin-bottom: 12px; font-size: 11px; }
	

	table { width: 100%; border-collapse: collapse; }
	

	th { background: #333; color: white; padding: 6px 8px; text-align: left; font-size: 11px; }
	

	td { padding: 5px 8px; border-bottom: 1px solid #eee; }
	

	tr:nth-child(even) td { background: #f9f9f9; }
	

	.code { color: #999; font-size: 10px; }
	

	.num { text-align: center; font-weight: bold; font-size: 15px; }
	

	.footer { margin-top: 16px; font-size: 11px; color: #666; border-top: 1px solid #ccc; padding-top: 8px; }
	

	</style></head><body>
	

	<h1>FenMeat — ${state.activeRoute}</h1>
	

	<div class="meta">📅 ${state.date} | ${route.day}${route.late ? ' | ⏰ LATE LOAD 13:00' : ''}</div>
	

	<table>
	

	<tr>
	

	<th>Code</th>
	

	<th>Product</th>
	

	<th style="text-align:center">OUT</th>
	

	<th style="text-align:center">✓</th>
	

	<th style="text-align:center">IN</th>
	

	</tr>
	

	${products.map(p => `
	

	<tr>
	

	<td class="code">${p.code}</td>
	

	<td>${p.name}</td>
	

	<td class="num">${p.out || ''}</td>
	

	<td class="num">☐</td>
	

	<td class="num"></td>
	

	</tr>
	

	`).join('')}
	

	</table>
	

	<div class="footer">
	

	CASH UP: R _____________ | Signed: _________________ | Date: ${state.date}
	

	</div>
	

	<script>window.print(); window.close();<\/script>
	

	</body></html>
	

	`);
	

	}
	

	

	

	// ═══════════════════════════════════════════════════════════════════
	

	// TOAST
	

	// ═══════════════════════════════════════════════════════════════════
	

	function showToast(msg, type) {
	

	const existing = document.querySelector('.toast');
	

	if (existing) existing.remove();
	

	const t = document.createElement('div');
	

	t.className = `toast ${type}`;
	

	t.textContent = msg;
	

	document.body.appendChild(t);
	

	setTimeout(() => t.remove(), 3500);
	

	}
	

	</script>
	

	</body>
	

	</html>
